apiVersion: apps/v1
kind: Deployment
metadata:
  name: elk-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: elk
  template:
    metadata:
      labels:
        app: elk
    spec:
      containers:
      - name: elk
        image: sebp/elk:780
        env:
        - name: ES_JAVA_OPTS
          value: "-Xms512m -Xmx512m" 
        - name: bootstrap.system_call_filter
          value: "false"
        ports:
        - containerPort: 5601
        - containerPort: 9200
        - containerPort: 5044
---
apiVersion: v1
kind: Service
metadata:
  name: elk-service
spec:
  type: NodePort
  selector:
    app: elk
  ports:
    - name: kibana
      port: 5601
      targetPort: 5601
      nodePort: 30560
    - name: elasticsearch
      port: 9200
      targetPort: 9200
      nodePort: 30920